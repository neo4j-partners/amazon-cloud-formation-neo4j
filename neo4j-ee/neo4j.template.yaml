AWSTemplateFormatVersion: '2010-09-09'
Description: Neo4j Enterprise Edition
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "AWS Marketplace Parameters"
        Parameters:
          - ImageId
      - Label:
          default: "Neo4j Configuration"
        Parameters:
          - Password
          - NumberOfServers
          - InstanceType
          - DataDiskSize
          - DataVolumeIops
          - DataVolumeThroughput
          - DataVolumeKmsKeyId
      - Label:
          default: "Security & Monitoring"
        Parameters:
          - DeploymentMode
          - AllowedCIDR
          - AlertEmail
          - BoltCertificateSecretArn
          - BoltAdvertisedDNS
    ParameterLabels:
      ImageId:
        default: Image ID
      Password:
        default: Password
      NumberOfServers:
        default: Number of Servers
      InstanceType:
        default: Instance Type
      DataDiskSize:
        default: Data Disk Size (GB)
      DataVolumeIops:
        default: Data Volume IOPS
      DataVolumeThroughput:
        default: Data Volume Throughput (MB/s)
      DataVolumeKmsKeyId:
        default: Data Volume KMS Key ID
      AlertEmail:
        default: Alert Email Address
      DeploymentMode:
        default: Deployment Mode
      AllowedCIDR:
        default: Allowed CIDR
      BoltCertificateSecretArn:
        default: Bolt TLS Certificate Secret ARN
      BoltAdvertisedDNS:
        default: Bolt Advertised DNS Name

Parameters:
  ImageId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/marketplace/prod-vwigx4rbvvb5s/2025.12.0
  Password:
    Description: >
      Password for the neo4j admin user. Must be at least 8 characters
      and contain both letters and numbers.
    Type: String
    MinLength: 8
    AllowedPattern: ^(?=.*[a-zA-Z])(?=.*[0-9]).{8,}$
    ConstraintDescription: Must be at least 8 characters and contain both letters and numbers.
    NoEcho: true
  NumberOfServers:
    Description: Number of EC2 instances to deploy
    Type: Number
    Default: 3
    AllowedValues:
    - 1
    - 3
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: r8i.xlarge
    AllowedValues:
    - t3.medium
    - r8i.large
    - r8i.xlarge
    - r8i.2xlarge
    - r8i.4xlarge
    - r8i.8xlarge
    - r8i.12xlarge
    - r8i.16xlarge
    - r8i.24xlarge
    - r8i.32xlarge
    - r8i.48xlarge
    - r8i.96xlarge
  DataDiskSize:
    Description: >-
      Size in GB of the persistent Neo4j data volume attached to each cluster
      node. This volume is retained across instance replacement: a new
      instance reattaches the existing volume and Raft catches up rather than
      performing a full store copy. The root volume (OS + Neo4j binaries) is
      fixed at 20 GB and not user-tunable.
    Type: Number
    Default: 100
    MinValue: 100
  DataVolumeIops:
    Description: >-
      Provisioned IOPS for the gp3 data volume. Valid range 3000–16000.
    Type: Number
    Default: 3000
    MinValue: 3000
    MaxValue: 16000
  DataVolumeThroughput:
    Description: >-
      Provisioned throughput in MB/s for the gp3 data volume. Valid range
      125–1000.
    Type: Number
    Default: 125
    MinValue: 125
    MaxValue: 1000
  DataVolumeKmsKeyId:
    Description: >-
      Optional. KMS key ID or ARN for data volume encryption. Leave blank to
      use the AWS-managed aws/ebs key.
    Type: String
    Default: ''
  AlertEmail:
    Description: Email address for CloudWatch alarm notifications. Leave blank to skip email subscription.
    Type: String
    Default: ''
  DeploymentMode:
    Type: String
    Default: Private
    AllowedValues:
      - Private
      - Public
    Description: >-
      Private deploys Neo4j with no public IPs; access via SSM Session Manager,
      VPN, or in-VPC clients. Public deploys with an internet-facing NLB and
      requires AllowedCIDR. Private is recommended for production.
  AllowedCIDR:
    Type: String
    AllowedPattern: '^(?!0\.0\.0\.0/0$)(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
    ConstraintDescription: Must be a valid CIDR block (e.g. 10.0.0.0/16 or your IP as x.x.x.x/32). The value 0.0.0.0/0 is not permitted.
    Description: >-
      CIDR allowed to reach Neo4j ports 7474 and 7687. In Private mode, enter
      10.0.0.0/16 (the VPC CIDR). In Public mode, enter the CIDR of the clients
      that should reach the internet-facing NLB (e.g. 203.0.113.0/24 for a
      known office egress). 0.0.0.0/0 is not accepted.

  BoltCertificateSecretArn:
    Type: String
    Default: ''
    Description: >-
      ARN of a Secrets Manager secret whose SecretString is JSON with
      "certificate" (PEM) and "private_key" (PEM) fields. When set, Neo4j
      enables TLS on Bolt port 7687 (server.bolt.tls_level=REQUIRED). Leave
      blank to run Bolt without TLS (suitable for dev/test inside a private VPC).
      ACM Private CA-issued certs are accepted here — no separate parameter needed.
  BoltAdvertisedDNS:
    Type: String
    Default: ''
    Description: >-
      Optional. DNS name placed in server.bolt.advertised_address and used as
      the cert SAN. Provide a stable alias (e.g. a Route53 CNAME → NLB) when
      deploying in production so certs do not pin the NLB DNS. When blank, the
      NLB DNS is used (test-rig default; two-phase deploy required).

Conditions:
  CreateCluster: !Not
    - !Equals
      - !Ref NumberOfServers
      - '1'
  HasAlertEmail: !Not
    - !Equals
      - !Ref AlertEmail
      - ''
  IsPrivate: !Equals [!Ref DeploymentMode, Private]
  IsPublic:
    Fn::Not:
      - Condition: IsPrivate
  IsPrivateCluster:
    Fn::And:
      - Condition: IsPrivate
      - Condition: CreateCluster
  BoltTLSEnabled: !Not [!Equals [!Ref BoltCertificateSecretArn, '']]
  UseCustomAdvertisedDNS: !Not [!Equals [!Ref BoltAdvertisedDNS, '']]
  HasDataVolumeCmk: !Not [!Equals [!Ref DataVolumeKmsKeyId, '']]

Resources:
  Neo4jVPC:
    Type: AWS::EC2::VPC
    Properties:
      EnableDnsHostnames: true
      EnableDnsSupport: true
      CidrBlock: 10.0.0.0/16
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"

  # ---------------------------------------------------------------------------
  # Public subnets — carry NAT Gateways in Private mode, carry instances in Public mode
  # ---------------------------------------------------------------------------

  Neo4jSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: !If [IsPrivate, false, true]
      AvailabilityZone:
        Fn::Select:
          - 0
          - Fn::GetAZs: !Ref 'AWS::Region'
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"
      VpcId: !Ref Neo4jVPC

  Neo4jSubnet2:
    Type: AWS::EC2::Subnet
    Condition: CreateCluster
    Properties:
      CidrBlock: 10.0.2.0/24
      MapPublicIpOnLaunch: !If [IsPrivate, false, true]
      AvailabilityZone:
        Fn::Select:
          - 1
          - Fn::GetAZs: !Ref 'AWS::Region'
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"
      VpcId: !Ref Neo4jVPC

  Neo4jSubnet3:
    Type: AWS::EC2::Subnet
    Condition: CreateCluster
    Properties:
      CidrBlock: 10.0.3.0/24
      MapPublicIpOnLaunch: !If [IsPrivate, false, true]
      AvailabilityZone:
        Fn::Select:
          - 2
          - Fn::GetAZs: !Ref 'AWS::Region'
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"
      VpcId: !Ref Neo4jVPC

  # ---------------------------------------------------------------------------
  # Private subnets — instances and NLB in Private mode
  # ---------------------------------------------------------------------------

  Neo4jPrivateSubnet1:
    Type: AWS::EC2::Subnet
    Condition: IsPrivate
    Properties:
      CidrBlock: 10.0.10.0/24
      MapPublicIpOnLaunch: false
      AvailabilityZone:
        Fn::Select:
          - 0
          - Fn::GetAZs: !Ref 'AWS::Region'
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"
      VpcId: !Ref Neo4jVPC

  Neo4jPrivateSubnet2:
    Type: AWS::EC2::Subnet
    Condition: IsPrivateCluster
    Properties:
      CidrBlock: 10.0.11.0/24
      MapPublicIpOnLaunch: false
      AvailabilityZone:
        Fn::Select:
          - 1
          - Fn::GetAZs: !Ref 'AWS::Region'
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"
      VpcId: !Ref Neo4jVPC

  Neo4jPrivateSubnet3:
    Type: AWS::EC2::Subnet
    Condition: IsPrivateCluster
    Properties:
      CidrBlock: 10.0.12.0/24
      MapPublicIpOnLaunch: false
      AvailabilityZone:
        Fn::Select:
          - 2
          - Fn::GetAZs: !Ref 'AWS::Region'
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"
      VpcId: !Ref Neo4jVPC

  # ---------------------------------------------------------------------------
  # NAT Gateways — one per AZ for 3-node Private, one for 1-node Private
  # ---------------------------------------------------------------------------

  Neo4jNatEIP1:
    Type: AWS::EC2::EIP
    Condition: IsPrivate
    Properties:
      Domain: vpc

  Neo4jNatEIP2:
    Type: AWS::EC2::EIP
    Condition: IsPrivateCluster
    Properties:
      Domain: vpc

  Neo4jNatEIP3:
    Type: AWS::EC2::EIP
    Condition: IsPrivateCluster
    Properties:
      Domain: vpc

  Neo4jNatGateway1:
    Type: AWS::EC2::NatGateway
    Condition: IsPrivate
    DependsOn: Neo4jInternetGatewayAttachment
    Properties:
      AllocationId: !GetAtt Neo4jNatEIP1.AllocationId
      SubnetId: !Ref Neo4jSubnet1
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'

  Neo4jNatGateway2:
    Type: AWS::EC2::NatGateway
    Condition: IsPrivateCluster
    DependsOn: Neo4jInternetGatewayAttachment
    Properties:
      AllocationId: !GetAtt Neo4jNatEIP2.AllocationId
      SubnetId: !Ref Neo4jSubnet2
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'

  Neo4jNatGateway3:
    Type: AWS::EC2::NatGateway
    Condition: IsPrivateCluster
    DependsOn: Neo4jInternetGatewayAttachment
    Properties:
      AllocationId: !GetAtt Neo4jNatEIP3.AllocationId
      SubnetId: !Ref Neo4jSubnet3
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'

  # ---------------------------------------------------------------------------
  # Private route tables — one per AZ, each with a default route to its NAT GW.
  # AZ 2 and 3 fall back to NAT GW 1 in 1-node Private deployments.
  # ---------------------------------------------------------------------------

  Neo4jPrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Condition: IsPrivate
    Properties:
      VpcId: !Ref Neo4jVPC
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"

  Neo4jPrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Condition: IsPrivate
    Properties:
      VpcId: !Ref Neo4jVPC
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"

  Neo4jPrivateRouteTable3:
    Type: AWS::EC2::RouteTable
    Condition: IsPrivate
    Properties:
      VpcId: !Ref Neo4jVPC
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"

  Neo4jPrivateRoute1:
    Type: AWS::EC2::Route
    Condition: IsPrivate
    Properties:
      RouteTableId: !Ref Neo4jPrivateRouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref Neo4jNatGateway1

  Neo4jPrivateRoute2:
    Type: AWS::EC2::Route
    Condition: IsPrivate
    Properties:
      RouteTableId: !Ref Neo4jPrivateRouteTable2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !If [IsPrivateCluster, !Ref Neo4jNatGateway2, !Ref Neo4jNatGateway1]

  Neo4jPrivateRoute3:
    Type: AWS::EC2::Route
    Condition: IsPrivate
    Properties:
      RouteTableId: !Ref Neo4jPrivateRouteTable3
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !If [IsPrivateCluster, !Ref Neo4jNatGateway3, !Ref Neo4jNatGateway1]

  Neo4jPrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsPrivate
    DependsOn: Neo4jPrivateRoute1
    Properties:
      RouteTableId: !Ref Neo4jPrivateRouteTable1
      SubnetId: !Ref Neo4jPrivateSubnet1

  Neo4jPrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsPrivateCluster
    DependsOn: Neo4jPrivateRoute2
    Properties:
      RouteTableId: !Ref Neo4jPrivateRouteTable2
      SubnetId: !Ref Neo4jPrivateSubnet2

  Neo4jPrivateSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsPrivateCluster
    DependsOn: Neo4jPrivateRoute3
    Properties:
      RouteTableId: !Ref Neo4jPrivateRouteTable3
      SubnetId: !Ref Neo4jPrivateSubnet3

  # ---------------------------------------------------------------------------
  # Public route table and Internet Gateway
  # ---------------------------------------------------------------------------

  Neo4jRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"
      VpcId: !Ref Neo4jVPC

  Neo4jRoute:
    Type: AWS::EC2::Route
    DependsOn: Neo4jInternetGatewayAttachment
    Properties:
      GatewayId: !Ref Neo4jInternetGateway
      RouteTableId: !Ref Neo4jRouteTable
      DestinationCidrBlock: 0.0.0.0/0

  Neo4jSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref Neo4jRouteTable
      SubnetId: !Ref Neo4jSubnet1

  Neo4jSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateCluster
    Properties:
      RouteTableId: !Ref Neo4jRouteTable
      SubnetId: !Ref Neo4jSubnet2

  Neo4jSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateCluster
    Properties:
      RouteTableId: !Ref Neo4jRouteTable
      SubnetId: !Ref Neo4jSubnet3

  Neo4jInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"

  Neo4jInternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref Neo4jInternetGateway
      VpcId: !Ref Neo4jVPC

  # ---------------------------------------------------------------------------
  # Network Load Balancer — internal in Private mode, internet-facing in Public mode
  # ---------------------------------------------------------------------------

  Neo4jNetworkLoadBalancer:
    DependsOn: Neo4jInternetGatewayAttachment
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      IpAddressType: ipv4
      Name: !Join
        - '-'
        - - !Ref 'AWS::StackName'
          - 'nlb'
      Scheme: !If [IsPrivate, internal, internet-facing]
      SecurityGroups:
        - !Ref Neo4jExternalSecurityGroup
      Subnets: !If
        - IsPrivate
        - !If [CreateCluster, [!Ref Neo4jPrivateSubnet1, !Ref Neo4jPrivateSubnet2, !Ref Neo4jPrivateSubnet3], [!Ref Neo4jPrivateSubnet1]]
        - !If [CreateCluster, [!Ref Neo4jSubnet1, !Ref Neo4jSubnet2, !Ref Neo4jSubnet3], [!Ref Neo4jSubnet1]]
      LoadBalancerAttributes:
        - Key: load_balancing.cross_zone.enabled
          Value: "true"
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"
      Type: network

  Neo4jHTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - TargetGroupArn: !Ref Neo4jHTTPTargetGroup
          Type: forward
      LoadBalancerArn: !Ref Neo4jNetworkLoadBalancer
      Port: 7474
      Protocol: TCP

  Neo4jBoltListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - TargetGroupArn: !Ref Neo4jBoltTargetGroup
          Type: forward
      LoadBalancerArn: !Ref Neo4jNetworkLoadBalancer
      Port: 7687
      Protocol: TCP

  Neo4jHTTPTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Join
        - '-'
        - - !Ref 'AWS::StackName'
          - 'http'
          - 'tg'
      Port: 7474
      Protocol: TCP
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 10
      Matcher:
        HttpCode: '200'
      # preserve_client_ip.enabled=false prevents NLB NAT-loopback (hairpin)
      # failures when operator tunnels reach the NLB from a cluster member.
      # See README "Private mode networking" and worklog/FIX_SSM_V7.md §9.
      TargetGroupAttributes:
        - Key: preserve_client_ip.enabled
          Value: "false"
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"
      VpcId: !Ref Neo4jVPC

  Neo4jBoltTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Join
        - '-'
        - - !Ref 'AWS::StackName'
          - 'bolt'
          - 'tg'
      Port: 7687
      Protocol: TCP
      HealthCheckIntervalSeconds: 10
      TargetGroupAttributes:
        - Key: preserve_client_ip.enabled
          Value: "false"
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"
      VpcId: !Ref Neo4jVPC

  # ---------------------------------------------------------------------------
  # Per-node persistent data volumes
  #
  # One gp3 EBS volume per cluster node, retained across instance replacement
  # (DeletionPolicy: Retain, UpdateReplacePolicy: Retain). Each volume is
  # pinned to a single AZ; the matching ASG is pinned to the same AZ. When
  # an instance is replaced, the new instance discovers its volume by tag
  # (StackID + Role=neo4j-cluster-data + own AZ), reattaches it, and starts
  # Neo4j against the existing store — so Raft catch-up replaces what would
  # otherwise be a full store copy.
  #
  # Losing a node: the volume survives and is reattached on replacement.
  # Losing the whole cluster (stack delete, region-wide ASG failure): the
  # volumes survive stack deletion and can be reattached to a fresh stack,
  # preserving the data across full-cluster loss.
  # ---------------------------------------------------------------------------

  Neo4jNode1DataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !Select [0, Fn::GetAZs: !Ref 'AWS::Region']
      Size: !Ref DataDiskSize
      VolumeType: gp3
      Iops: !Ref DataVolumeIops
      Throughput: !Ref DataVolumeThroughput
      Encrypted: true
      KmsKeyId: !If [HasDataVolumeCmk, !Ref DataVolumeKmsKeyId, !Ref AWS::NoValue]
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Sub '${AWS::StackName}-data-1'
        - Key: Role
          Value: neo4j-cluster-data
        - Key: NodeIndex
          Value: "1"
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"

  Neo4jNode2DataVolume:
    Type: AWS::EC2::Volume
    Condition: CreateCluster
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !Select [1, Fn::GetAZs: !Ref 'AWS::Region']
      Size: !Ref DataDiskSize
      VolumeType: gp3
      Iops: !Ref DataVolumeIops
      Throughput: !Ref DataVolumeThroughput
      Encrypted: true
      KmsKeyId: !If [HasDataVolumeCmk, !Ref DataVolumeKmsKeyId, !Ref AWS::NoValue]
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Sub '${AWS::StackName}-data-2'
        - Key: Role
          Value: neo4j-cluster-data
        - Key: NodeIndex
          Value: "2"
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"

  Neo4jNode3DataVolume:
    Type: AWS::EC2::Volume
    Condition: CreateCluster
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !Select [2, Fn::GetAZs: !Ref 'AWS::Region']
      Size: !Ref DataDiskSize
      VolumeType: gp3
      Iops: !Ref DataVolumeIops
      Throughput: !Ref DataVolumeThroughput
      Encrypted: true
      KmsKeyId: !If [HasDataVolumeCmk, !Ref DataVolumeKmsKeyId, !Ref AWS::NoValue]
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Sub '${AWS::StackName}-data-3'
        - Key: Role
          Value: neo4j-cluster-data
        - Key: NodeIndex
          Value: "3"
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"

  # ---------------------------------------------------------------------------
  # Auto Scaling Groups — one per cluster node, each pinned to a single AZ.
  #
  # The three ASGs share a single LaunchTemplate; each launched instance
  # discovers its own ASG logical-id from the aws:cloudformation:logical-id
  # tag (auto-applied by CFN) so cfn-signal can route to the correct ASG's
  # CreationPolicy. Topology is 1:1 between ASG ↔ AZ ↔ data volume, so a
  # replacement instance always lands in the same AZ as its persistent
  # volume and reattaches deterministically.
  #
  # In 1-node mode, only Node1ASG is created.
  # ---------------------------------------------------------------------------

  Neo4jNode1ASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn:
