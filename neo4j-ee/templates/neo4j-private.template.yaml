  # ---------------------------------------------------------------------------
  # Operator bastion (Private mode only)
  # A non-Neo4j-target t4g.nano used as the SSM Session Manager entry point
  # for operator port-forwarding to the internal NLB. It is deliberately NOT
  # registered in any NLB target group — that topology makes NAT-loopback
  # (hairpin) failures impossible for flows originating from the bastion, so
  # operator tunnels to :7474/:7687 via the NLB always route to a different
  # instance than the flow source. See README "Private mode networking" and
  # neo4j-ee/worklog/FIX_SSM_V7.md §9 for the full analysis.
  # ---------------------------------------------------------------------------

  Neo4jBastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Operator bastion - no ingress; outbound via VPC endpoints and NLB
      VpcId: !Ref Neo4jVPC
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Sub '${AWS::StackName}-bastion-sg'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"

  # ---------------------------------------------------------------------------
  # VPC endpoints for Systems Manager (Private mode only)
  # Routes SSM control-plane traffic through AWS PrivateLink rather than NAT.
  # Required: ssm (registration/polling), ssmmessages (Session Manager),
  #           ec2messages (backward compat with pre-2024 regions).
  # S3 gateway endpoint is free and prevents SSM Agent update traffic from
  # consuming NAT Gateway data-processing charges.
  # ---------------------------------------------------------------------------

  VpcEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTPS from Neo4j instances and operator bastion to VPC interface endpoints
      VpcId: !Ref Neo4jVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref Neo4jExternalSecurityGroup
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref Neo4jBastionSecurityGroup

  # ---------------------------------------------------------------------------
  # Per-node persistent data volumes
  #
  # One gp3 EBS volume per cluster node, retained across instance replacement
  # (DeletionPolicy: Retain, UpdateReplacePolicy: Retain). Each volume is
  # pinned to a single AZ; the matching ASG is pinned to the same AZ. When
  # an instance is replaced, the new instance discovers its volume by tag
  # (StackID + Role=neo4j-cluster-data + own AZ), reattaches it, and starts
  # Neo4j against the existing store — so Raft catch-up replaces what would
  # otherwise be a full store copy.
  #
  # Losing a node: the volume survives and is reattached on replacement.
  # Losing the whole cluster (stack delete, region-wide ASG failure): the
  # volumes survive stack deletion and can be reattached to a fresh stack,
  # preserving the data across full-cluster loss.
  # ---------------------------------------------------------------------------

  Neo4jNode1DataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !Select [0, Fn::GetAZs: !Ref 'AWS::Region']
      Size: !Ref DataDiskSize
      SnapshotId: !If [HasNode1Snapshot, !Ref Node1SnapshotId, !Ref 'AWS::NoValue']
      VolumeType: gp3
      Iops: 4000
      Throughput: 250
      Encrypted: true
      KmsKeyId: !If [HasDataVolumeCmk, !Ref DataVolumeKmsKeyId, !Ref AWS::NoValue]
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Sub '${AWS::StackName}-data-1'
        - Key: Role
          Value: neo4j-cluster-data
        - Key: NodeIndex
          Value: "1"
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"

