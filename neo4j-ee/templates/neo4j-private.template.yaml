  # Tables 2/3 are empty with no subnet associations in 1-node mode.
  # ---------------------------------------------------------------------------

  Neo4jPrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Neo4jVPC
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"

  Neo4jPrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Neo4jVPC
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"

  Neo4jPrivateRouteTable3:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Neo4jVPC
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"

  Neo4jPrivateRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref Neo4jPrivateRouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref Neo4jNatGateway1

  Neo4jPrivateRoute2:
    Type: AWS::EC2::Route
    Condition: CreateCluster
    Properties:
      RouteTableId: !Ref Neo4jPrivateRouteTable2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref Neo4jNatGateway2

  Neo4jPrivateRoute3:
    Type: AWS::EC2::Route
    Condition: CreateCluster
    Properties:
      RouteTableId: !Ref Neo4jPrivateRouteTable3
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref Neo4jNatGateway3

  Neo4jPrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    DependsOn: Neo4jPrivateRoute1
    Properties:
      RouteTableId: !Ref Neo4jPrivateRouteTable1
      SubnetId: !Ref Neo4jPrivateSubnet1

  Neo4jPrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateCluster
    DependsOn: Neo4jPrivateRoute2
    Properties:
      RouteTableId: !Ref Neo4jPrivateRouteTable2
      SubnetId: !Ref Neo4jPrivateSubnet2

  Neo4jPrivateSubnet3RouteTableAssociation:
