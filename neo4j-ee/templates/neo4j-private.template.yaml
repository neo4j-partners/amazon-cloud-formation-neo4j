  # ---------------------------------------------------------------------------

  Neo4jNetworkLoadBalancer:
    DependsOn: Neo4jInternetGatewayAttachment
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      IpAddressType: ipv4
      Name: !Join
        - '-'
        - - !Ref 'AWS::StackName'
          - 'nlb'
      Scheme: internal
      SecurityGroups:
        - !Ref Neo4jExternalSecurityGroup
      Subnets: !If
        - CreateCluster
        - - !Ref Neo4jPrivateSubnet1
          - !Ref Neo4jPrivateSubnet2
          - !Ref Neo4jPrivateSubnet3
        - - !Ref Neo4jPrivateSubnet1
      LoadBalancerAttributes:
        - Key: load_balancing.cross_zone.enabled
          Value: "true"
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"
      Type: network

  Neo4jHTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - TargetGroupArn: !Ref Neo4jHTTPTargetGroup
          Type: forward
      LoadBalancerArn: !Ref Neo4jNetworkLoadBalancer
      Port: 7474
      Protocol: TCP

  Neo4jBoltListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - TargetGroupArn: !Ref Neo4jBoltTargetGroup
          Type: forward
      LoadBalancerArn: !Ref Neo4jNetworkLoadBalancer
      Port: 7687
      Protocol: TCP

  Neo4jHTTPTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Join
        - '-'
        - - !Ref 'AWS::StackName'
          - 'http'
          - 'tg'
      Port: 7474
      Protocol: TCP
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 10
      Matcher:
        HttpCode: '200'
      # preserve_client_ip.enabled=false prevents NLB NAT-loopback (hairpin)
      # failures when operator tunnels reach the NLB from a cluster member.
      # See README "Private mode networking" and worklog/FIX_SSM_V7.md §9.
      TargetGroupAttributes:
        - Key: preserve_client_ip.enabled
          Value: "false"
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"
      VpcId: !Ref Neo4jVPC

  Neo4jBoltTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Join
        - '-'
        - - !Ref 'AWS::StackName'
          - 'bolt'
          - 'tg'
      Port: 7687
      Protocol: TCP
      HealthCheckIntervalSeconds: 10
      TargetGroupAttributes:
        - Key: preserve_client_ip.enabled
          Value: "false"
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Ref 'AWS::StackName'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"
      VpcId: !Ref Neo4jVPC

  Neo4jOperatorBastion:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT10M
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64}}'
      InstanceType: t4g.nano
      SubnetId: !Ref Neo4jPrivateSubnet1
      SecurityGroupIds:
        - !Ref Neo4jBastionSecurityGroup
      IamInstanceProfile: !Ref Neo4jBastionInstanceProfile
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp3
            Encrypted: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          exec > >(tee /var/log/user-data.log | logger -t user-data -s 2>/dev/console) 2>&1

          dnf install -y python3.11 python3.11-pip
          dnf update -y aws-cfn-bootstrap
          python3.11 -m pip install 'neo4j>=6,<7' boto3

          # Neo4j yum repo + cypher-shell for interactive admin via:
          #   aws ssm start-session --target <bastion> → cypher-shell -a neo4j://<nlb>:7687
          rpm --import https://debian.neo4j.com/neotechnology.gpg.key
          printf '[neo4j]\nname=Neo4j RPM Repository\nbaseurl=https://yum.neo4j.com/stable/latest\nenabled=1\ngpgcheck=1\n' >/etc/yum.repos.d/neo4j.repo
          dnf install -y cypher-shell

          systemctl is-active amazon-ssm-agent

          /opt/aws/bin/cfn-signal --success true \
            --stack ${AWS::StackName} \
            --resource Neo4jOperatorBastion \
            --region ${AWS::Region}
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: Name
          Value: !Sub '${AWS::StackName}-bastion'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"

  SsmVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ssm'
      VpcId: !Ref Neo4jVPC
      SubnetIds: !If
        - CreateCluster
        - - !Ref Neo4jPrivateSubnet1
          - !Ref Neo4jPrivateSubnet2
          - !Ref Neo4jPrivateSubnet3
        - - !Ref Neo4jPrivateSubnet1
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup
      PrivateDnsEnabled: true

  SsmMessagesVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ssmmessages'
      VpcId: !Ref Neo4jVPC
      SubnetIds: !If
        - CreateCluster
        - - !Ref Neo4jPrivateSubnet1
          - !Ref Neo4jPrivateSubnet2
          - !Ref Neo4jPrivateSubnet3
        - - !Ref Neo4jPrivateSubnet1
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup
      PrivateDnsEnabled: true

  LogsVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.logs'
      VpcId: !Ref Neo4jVPC
      SubnetIds: !If
        - CreateCluster
        - - !Ref Neo4jPrivateSubnet1
          - !Ref Neo4jPrivateSubnet2
          - !Ref Neo4jPrivateSubnet3
        - - !Ref Neo4jPrivateSubnet1
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup
      PrivateDnsEnabled: true

  SecretsManagerVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.secretsmanager'
      VpcId: !Ref Neo4jVPC
      SubnetIds: !If
        - CreateCluster
        - - !Ref Neo4jPrivateSubnet1
          - !Ref Neo4jPrivateSubnet2
          - !Ref Neo4jPrivateSubnet3
        - - !Ref Neo4jPrivateSubnet1
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup
      PrivateDnsEnabled: true

  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Gateway
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcId: !Ref Neo4jVPC
      RouteTableIds: !If
        - CreateCluster
        - - !Ref Neo4jPrivateRouteTable1
          - !Ref Neo4jPrivateRouteTable2
          - !Ref Neo4jPrivateRouteTable3
        - - !Ref Neo4jPrivateRouteTable1

  Neo4jPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'neo4j/${AWS::StackName}/password'
      Description: !Sub 'Neo4j admin password for stack ${AWS::StackName}'
      SecretString: !Ref Password
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"

  Neo4jConfigVpcIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/vpc-id'
      Type: String
      Value: !Ref Neo4jVPC
      Description: VPC ID for the Neo4j EE stack.

  Neo4jConfigNlbDnsParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/nlb-dns'
      Type: String
      Value: !GetAtt Neo4jNetworkLoadBalancer.DNSName
      Description: Internal NLB DNS name (connect via neo4j://<dns>:7687 from in-VPC).

  Neo4jConfigRegionParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/region'
      Type: String
      Value: !Ref 'AWS::Region'
      Description: AWS region for the Neo4j EE stack.

  Neo4jConfigStackNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/stack-name'
      Type: String
      Value: !Ref 'AWS::StackName'
      Description: CloudFormation stack name.

  Neo4jConfigPrivateSubnet1Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/private-subnet-1-id'
      Type: String
      Value: !Ref Neo4jPrivateSubnet1
      Description: First private subnet ID (Lambda / reference app placement).

  Neo4jConfigPrivateSubnet2Parameter:
    Type: AWS::SSM::Parameter
    Condition: CreateCluster
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/private-subnet-2-id'
      Type: String
      Value: !Ref Neo4jPrivateSubnet2
      Description: Second private subnet ID (Lambda / reference app placement).

  Neo4jConfigPasswordSecretArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/password-secret-arn'
      Type: String
      Value: !Ref Neo4jPasswordSecret
      Description: Secrets Manager ARN for the Neo4j admin password (used by in-VPC Lambda clients).

  Neo4jConfigExternalSgIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/external-sg-id'
      Type: String
      Value: !GetAtt Neo4jExternalSecurityGroup.GroupId
      Description: Neo4j external security group ID (Lambda egress rule target for port 7687).

  Neo4jConfigVpcEndpointSgParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/vpc-endpoint-sg-id'
      Type: String
      Value: !GetAtt VpcEndpointSecurityGroup.GroupId
      Description: Security group ID on all interface VPC endpoints. In-VPC apps add this as an ingress rule source so their SG can reach SSM, Secrets Manager, and CloudWatch Logs via PrivateLink.

  Neo4jFlowLogsGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/vpc/flowlogs/${AWS::StackName}'
      RetentionInDays: 90

  Neo4jFlowLogsIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: Neo4jFlowLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub '${Neo4jFlowLogsGroup.Arn}:*'
              - Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: '*'

  Neo4jVPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceType: VPC
      ResourceId: !Ref Neo4jVPC
      TrafficType: ALL
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref Neo4jFlowLogsGroup
      DeliverLogsPermissionArn: !GetAtt Neo4jFlowLogsIAMRole.Arn

  Neo4jAppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/neo4j/${AWS::StackName}/application'
      RetentionInDays: 90

  Neo4jAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'neo4j-alerts-${AWS::StackName}'
      Subscription:
        Fn::If:
          - HasAlertEmail
          - - Protocol: email
              Endpoint: !Ref AlertEmail
          - !Ref AWS::NoValue

  Neo4jFailedAuthMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref Neo4jAppLogGroup
      FilterPattern: '"failed to log in"'
      MetricTransformations:
        - MetricNamespace: !Sub 'Neo4j/${AWS::StackName}'
          MetricName: FailedAuthAttempts
          MetricValue: '1'
          DefaultValue: 0

  Neo4jFailedAuthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'Neo4j-FailedAuth-${AWS::StackName}'
      AlarmDescription: 'Neo4j authentication failures exceeded 10 in a 5-minute window'
      MetricName: FailedAuthAttempts
      Namespace: !Sub 'Neo4j/${AWS::StackName}'
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref Neo4jAlertTopic
      TreatMissingData: notBreaching

Outputs:
  Neo4jInternalDNS:
    Description: Internal NLB DNS name (not internet-reachable; use SSM port-forwarding to connect)
    Value: !GetAtt Neo4jNetworkLoadBalancer.DNSName
  Neo4jOperatorBastionId:
    Description: >-
      Operator bastion instance ID. Use this as the SSM --target for port-forwarding
      to the internal NLB. The bastion is deliberately not a Neo4j NLB target, so
      tunneled flows cannot hairpin back to their source.
    Value: !Ref Neo4jOperatorBastion
  Neo4jNode1ASGName:
    Description: Auto Scaling Group name for Neo4j cluster node 1.
    Value: !Ref Neo4jNode1ASG
  Neo4jNode2ASGName:
    Condition: CreateCluster
    Description: Auto Scaling Group name for Neo4j cluster node 2.
    Value: !Ref Neo4jNode2ASG
  Neo4jNode3ASGName:
    Condition: CreateCluster
    Description: Auto Scaling Group name for Neo4j cluster node 3.
    Value: !Ref Neo4jNode3ASG
  Neo4jDataVolumeIds:
    Description: >-
      Comma-separated list of persistent data volume IDs. Retained across
      stack deletion — see teardown.sh --delete-volumes to remove.
    Value: !If
      - CreateCluster
      - !Sub '${Neo4jNode1DataVolume},${Neo4jNode2DataVolume},${Neo4jNode3DataVolume}'
      - !Ref Neo4jNode1DataVolume
  Neo4jSSMBoltCommand:
    Description: "SSM port-forward for Bolt via operator bastion: run then connect to neo4j://localhost:7687"
    Value: !Sub "aws ssm start-session --target ${Neo4jOperatorBastion} --document-name AWS-StartPortForwardingSessionToRemoteHost --parameters 'host=${Neo4jNetworkLoadBalancer.DNSName},portNumber=7687,localPortNumber=7687' --region ${AWS::Region}"
  Neo4jSSMHTTPCommand:
    Description: "SSM port-forward for Browser via operator bastion: run then open http://localhost:7474"
    Value: !Sub "aws ssm start-session --target ${Neo4jOperatorBastion} --document-name AWS-StartPortForwardingSessionToRemoteHost --parameters 'host=${Neo4jNetworkLoadBalancer.DNSName},portNumber=7474,localPortNumber=7474' --region ${AWS::Region}"
  Neo4jPasswordSecretArn:
    Description: >-
      Secrets Manager ARN holding the Neo4j admin password. The plaintext
      password is deliberately not exposed as a CFN Output — reading it
      requires separate secretsmanager:GetSecretValue IAM on this ARN.
    Value: !Ref Neo4jPasswordSecret
  Neo4jPasswordRetrieveCommand:
    Description: "Copy-paste CLI to retrieve the Neo4j password from Secrets Manager."
    Value: !Sub "aws secretsmanager get-secret-value --secret-id ${Neo4jPasswordSecret} --query SecretString --output text --region ${AWS::Region}"
  Neo4jConfigParameterPrefix:
    Description: >-
      SSM Parameter Store path prefix for non-secret stack configuration.
      Entries: vpc-id, nlb-dns, region, stack-name, private-subnet-1-id,
      private-subnet-2-id, password-secret-arn, external-sg-id, vpc-endpoint-sg-id.
      In-VPC apps read from here instead of the operator's local
      .deploy/<stack>.txt file.
    Value: !Sub '/neo4j-ee/${AWS::StackName}/'
  Username:
    Description: 'The username is neo4j.'
    Value: 'neo4j'
  Neo4jAppLogGroupName:
    Description: CloudWatch Logs log group for Neo4j application logs
    Value: !Ref Neo4jAppLogGroup
  Neo4jAlertTopicArn:
    Description: SNS topic ARN for Neo4j security alerts
    Value: !Ref Neo4jAlertTopic
  VpcFlowLogGroupName:
    Description: CloudWatch Logs log group for VPC flow logs
    Value: !Ref Neo4jFlowLogsGroup
  FailedAuthAlarmName:
    Description: CloudWatch alarm name for Neo4j failed authentication events
    Value: !Ref Neo4jFailedAuthAlarm
