  CreateCluster: !Not
    - !Equals
      - !Ref NumberOfServers
      - '1'
  HasAlertEmail: !Not
    - !Equals
      - !Ref AlertEmail
      - ''
  HasDataVolumeCmk: !Not [!Equals [!Ref DataVolumeKmsKeyId, '']]
  HasNode1Snapshot: !Not [!Equals [!Ref Node1SnapshotId, '']]
  CreateVpcEndpoints: !Equals [!Ref CreateVpcEndpoints, 'true']
  UseExistingVpcEndpoints: !Equals [!Ref CreateVpcEndpoints, 'false']
