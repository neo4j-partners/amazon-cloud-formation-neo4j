  CreateCluster: !Not
    - !Equals
      - !Ref NumberOfServers
      - '1'
  HasAlertEmail: !Not
    - !Equals
      - !Ref AlertEmail
      - ''
  BoltTLSEnabled: !Not [!Equals [!Ref BoltCertificateSecretArn, '']]
  HasDataVolumeCmk: !Not [!Equals [!Ref DataVolumeKmsKeyId, '']]
  CreateSSMEndpoint: !Equals [!Ref CreateSSMEndpoint, 'true']
  CreateSecretsManagerEndpoint: !Equals [!Ref CreateSecretsManagerEndpoint, 'true']
