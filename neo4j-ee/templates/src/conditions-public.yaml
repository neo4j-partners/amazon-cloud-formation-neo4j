  CreateCluster: !Not
    - !Equals
      - !Ref NumberOfServers
      - '1'
  HasAlertEmail: !Not
    - !Equals
      - !Ref AlertEmail
      - ''
  HasDataVolumeCmk: !Not [!Equals [!Ref DataVolumeKmsKeyId, '']]
  HasNode1Snapshot: !Not [!Equals [!Ref Node1SnapshotId, '']]
  UsePublicTLS: !And
    - !Equals [!Ref EnableTLS, 'true']
    - !Not [!Equals [!Ref CertificateArn, '']]
  BloomEnabledAndLicensed: !And
    - !Equals [!Ref InstallBloom, 'true']
    - !Not [!Equals [!Ref BloomLicenseSecretArn, '']]
  GdsEnabledAndLicensed: !And
    - !Equals [!Ref InstallGDS, 'true']
    - !Not [!Equals [!Ref GdsLicenseSecretArn, '']]
