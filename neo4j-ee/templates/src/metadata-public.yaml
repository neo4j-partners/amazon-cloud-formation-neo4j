  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "AWS Marketplace Parameters"
        Parameters:
          - ImageId
      - Label:
          default: "Neo4j Configuration"
        Parameters:
          - Password
          - NumberOfServers
          - InstanceType
          - DataDiskSize
          - DataVolumeKmsKeyId
      - Label:
          default: "TLS"
        Parameters:
          - CertificateArn
          - AdvertisedDNS
      - Label:
          default: "Security & Monitoring"
        Parameters:
          - AllowedCIDR
          - AlertEmail
    ParameterLabels:
      ImageId:
        default: Image ID
      Password:
        default: Password
      NumberOfServers:
        default: Number of Servers
      InstanceType:
        default: Instance Type
      DataDiskSize:
        default: Data Disk Size (GB)
      DataVolumeKmsKeyId:
        default: Data Volume KMS Key ID
      AlertEmail:
        default: Alert Email Address
      AllowedCIDR:
        default: Allowed CIDR
      CertificateArn:
        default: ACM Certificate ARN
      AdvertisedDNS:
        default: Advertised DNS Name
