  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "AWS Marketplace Parameters"
        Parameters:
          - ImageId
      - Label:
          default: "Neo4j Configuration"
        Parameters:
          - Password
          - NumberOfServers
          - InstanceType
          - DataDiskSize
          - DataVolumeKmsKeyId
      - Label:
          default: "Plugin licensing (Bloom, GDS)"
        Parameters:
          - InstallBloom
          - BloomLicenseSecretArn
          - InstallGDS
          - GdsLicenseSecretArn
      - Label:
          default: "Optional Public TLS"
        Parameters:
          - EnableTLS
          - CertificateArn
          - AdvertisedDNS
      - Label:
          default: "Security & Monitoring"
        Parameters:
          - AllowedCIDR
          - AlertEmail
    ParameterLabels:
      ImageId:
        default: Image ID
      Password:
        default: Password
      NumberOfServers:
        default: Number of Servers
      InstanceType:
        default: Instance Type
      DataDiskSize:
        default: Data Disk Size (GB)
      DataVolumeKmsKeyId:
        default: Data Volume KMS Key ID
      InstallBloom:
        default: Install Bloom Plugin
      BloomLicenseSecretArn:
        default: Bloom License Secret ARN
      InstallGDS:
        default: Install Graph Data Science Plugin
      GdsLicenseSecretArn:
        default: GDS License Secret ARN
      AlertEmail:
        default: Alert Email Address
      AllowedCIDR:
        default: Allowed CIDR
      EnableTLS:
        default: Enable TLS
      CertificateArn:
        default: ACM Certificate ARN
      AdvertisedDNS:
        default: Advertised DNS Name
