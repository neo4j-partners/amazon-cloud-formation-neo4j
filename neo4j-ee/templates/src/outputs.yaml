  # Public mode: direct browser and Bolt URLs
  Neo4jBrowserURL:
    Condition: IsPublic
    Description: URL for Neo4j Browser
    Value: !Join
      - ''
      - - 'http://'
        - !GetAtt Neo4jNetworkLoadBalancer.DNSName
        - ':'
        - '7474'
  Neo4jURI:
    Condition: IsPublic
    Description: Neo4j URI
    Value: !Join
      - ''
      - - 'neo4j://'
        - !GetAtt Neo4jNetworkLoadBalancer.DNSName
        - ':'
        - '7687'

  # Private mode: internal NLB DNS and SSM access commands
  Neo4jInternalDNS:
    Condition: IsPrivate
    Description: Internal NLB DNS name (not internet-reachable; use SSM port-forwarding to connect)
    Value: !GetAtt Neo4jNetworkLoadBalancer.DNSName
  Neo4jOperatorBastionId:
    Condition: IsPrivate
    Description: >-
      Operator bastion instance ID. Use this as the SSM --target for port-forwarding
      to the internal NLB. The bastion is deliberately not a Neo4j NLB target, so
      tunneled flows cannot hairpin back to their source.
    Value: !Ref Neo4jOperatorBastion
  Neo4jNode1ASGName:
    Condition: IsPrivate
    Description: Auto Scaling Group name for Neo4j cluster node 1.
    Value: !Ref Neo4jNode1ASG
  Neo4jNode2ASGName:
    Condition: IsPrivateCluster
    Description: Auto Scaling Group name for Neo4j cluster node 2.
    Value: !Ref Neo4jNode2ASG
  Neo4jNode3ASGName:
    Condition: IsPrivateCluster
    Description: Auto Scaling Group name for Neo4j cluster node 3.
    Value: !Ref Neo4jNode3ASG
  Neo4jDataVolumeIds:
    Description: >-
      Comma-separated list of persistent data volume IDs. Retained across
      stack deletion — see teardown.sh --delete-volumes to remove.
    Value: !If
      - CreateCluster
      - !Sub '${Neo4jNode1DataVolume},${Neo4jNode2DataVolume},${Neo4jNode3DataVolume}'
      - !Ref Neo4jNode1DataVolume
  Neo4jSSMBoltCommand:
    Condition: IsPrivate
    Description: "SSM port-forward for Bolt via operator bastion: run then connect to neo4j://localhost:7687"
    Value: !Sub "aws ssm start-session --target ${Neo4jOperatorBastion} --document-name AWS-StartPortForwardingSessionToRemoteHost --parameters 'host=${Neo4jNetworkLoadBalancer.DNSName},portNumber=7687,localPortNumber=7687' --region ${AWS::Region}"
  Neo4jSSMHTTPCommand:
    Condition: IsPrivate
    Description: "SSM port-forward for Browser via operator bastion: run then open http://localhost:7474"
    Value: !Sub "aws ssm start-session --target ${Neo4jOperatorBastion} --document-name AWS-StartPortForwardingSessionToRemoteHost --parameters 'host=${Neo4jNetworkLoadBalancer.DNSName},portNumber=7474,localPortNumber=7474' --region ${AWS::Region}"
  Neo4jPasswordSecretArn:
    Condition: IsPrivate
    Description: >-
      Secrets Manager ARN holding the Neo4j admin password. The plaintext
      password is deliberately not exposed as a CFN Output — reading it
      requires separate secretsmanager:GetSecretValue IAM on this ARN.
    Value: !Ref Neo4jPasswordSecret
  Neo4jPasswordRetrieveCommand:
    Condition: IsPrivate
    Description: "Copy-paste CLI to retrieve the Neo4j password from Secrets Manager."
    Value: !Sub "aws secretsmanager get-secret-value --secret-id ${Neo4jPasswordSecret} --query SecretString --output text --region ${AWS::Region}"
  Neo4jConfigParameterPrefix:
    Condition: IsPrivate
    Description: >-
      SSM Parameter Store path prefix for non-secret stack configuration.
      Entries: vpc-id, nlb-dns, region, stack-name, private-subnet-1-id,
      private-subnet-2-id, password-secret-arn, external-sg-id, vpc-endpoint-sg-id.
      In-VPC apps read from here instead of the operator's local
      .deploy/<stack>.txt file.
    Value: !Sub '/neo4j-ee/${AWS::StackName}/'

  # Common outputs
  Username:
    Description: 'The username is neo4j.'
    Value: 'neo4j'
  Neo4jAppLogGroupName:
    Description: CloudWatch Logs log group for Neo4j application logs
    Value: !Ref Neo4jAppLogGroup
  Neo4jAlertTopicArn:
    Description: SNS topic ARN for Neo4j security alerts
    Value: !Ref Neo4jAlertTopic
  VpcFlowLogGroupName:
    Description: CloudWatch Logs log group for VPC flow logs
    Value: !Ref Neo4jFlowLogsGroup
  FailedAuthAlarmName:
    Description: CloudWatch alarm name for Neo4j failed authentication events
    Value: !Ref Neo4jFailedAuthAlarm
