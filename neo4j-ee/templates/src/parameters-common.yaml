  ImageId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/marketplace/prod-vwigx4rbvvb5s/2026.03.1
  Password:
    Description: >
      Password for the neo4j admin user. Must be at least 8 characters
      and contain only letters and numbers.
    Type: String
    MinLength: 8
    AllowedPattern: ^[a-zA-Z0-9]{8,}$
    ConstraintDescription: Must be at least 8 characters and contain only letters and numbers (no special characters).
    NoEcho: true
  NumberOfServers:
    Description: Number of EC2 instances to deploy
    Type: Number
    Default: 3
    AllowedValues:
    - 1
    - 3
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: r8i.xlarge
    AllowedValues:
    - t3.medium
    - r8i.large
    - r8i.xlarge
    - r8i.2xlarge
    - r8i.4xlarge
    - r8i.8xlarge
    - r8i.12xlarge
    - r8i.16xlarge
    - r8i.24xlarge
    - r8i.32xlarge
    - r8i.48xlarge
    - r8i.96xlarge
  DataDiskSize:
    Description: >-
      Size in GB of the persistent Neo4j data volume attached to each cluster
      node. This volume is retained across instance replacement: a new
      instance reattaches the existing volume and Raft catches up rather than
      performing a full store copy. The root volume (OS + Neo4j binaries) is
      fixed at 20 GB and not user-tunable.
    Type: Number
    Default: 100
    MinValue: 100
    MaxValue: 16384
    ConstraintDescription: gp3 volumes are capped at 16,384 GiB.
  DataVolumeKmsKeyId:
    Description: >-
      Optional. KMS key ID or ARN for data volume encryption. Leave blank to
      use the account's default EBS encryption key (aws/ebs unless overridden
      at the account level).
    Type: String
    Default: ''
  AlertEmail:
    Description: Email address for CloudWatch alarm notifications. Leave blank to skip email subscription.
    Type: String
    Default: ''
  InstallGDS:
    Description: >-
      Install the Graph Data Science plugin at deploy time. Requires a matching
      GdsLicenseSecretArn pointing to a Secrets Manager secret holding the GDS
      license file contents. The JAR is staged in the AMI and copied to the
      plugins directory when this is true; leaving this false skips the copy.
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
  InstallBloom:
    Description: >-
      Install the Neo4j Bloom plugin at deploy time. Requires a matching
      BloomLicenseSecretArn pointing to a Secrets Manager secret holding the
      Bloom license file contents. The JAR is staged in the AMI and copied to
      the plugins directory when this is true; leaving this false skips the copy.
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
  BloomLicenseSecretArn:
    Description: >-
      ARN of a Secrets Manager secret whose SecretString is the Neo4j Bloom
      license file contents. Required when InstallBloom is true; ignored
      otherwise. The instance role is granted secretsmanager:GetSecretValue
      scoped to this ARN only. Leave blank if not installing Bloom.
    Type: String
    Default: ''
    AllowedPattern: '^$|^arn:aws[a-zA-Z-]*:secretsmanager:[a-z0-9-]+:[0-9]{12}:secret:[A-Za-z0-9/_+=.@-]+$'
    ConstraintDescription: >-
      Must be empty or a valid AWS Secrets Manager secret ARN. The secret-name
      segment must be literal characters only — wildcards (* or ?) are rejected
      because they would broaden the IAM grant beyond a single secret.
  GdsLicenseSecretArn:
    Description: >-
      ARN of a Secrets Manager secret whose SecretString is the Neo4j Graph
      Data Science license file contents. Required when InstallGDS is true;
      ignored otherwise. The instance role is granted secretsmanager:GetSecretValue
      scoped to this ARN only. Leave blank if not installing GDS.
    Type: String
    Default: ''
    AllowedPattern: '^$|^arn:aws[a-zA-Z-]*:secretsmanager:[a-z0-9-]+:[0-9]{12}:secret:[A-Za-z0-9/_+=.@-]+$'
    ConstraintDescription: >-
      Must be empty or a valid AWS Secrets Manager secret ARN. The secret-name
      segment must be literal characters only — wildcards (* or ?) are rejected
      because they would broaden the IAM grant beyond a single secret.
  Node1SnapshotId:
    Description: >-
      Optional. Snapshot ID to restore Node 1's data volume from. Leave blank
      to create a fresh empty volume. DataDiskSize must be >= the snapshot size.
    Type: String
    Default: ''
