  ImageId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/marketplace/prod-vwigx4rbvvb5s/2026.03.1
  Password:
    Description: >
      Password for the neo4j admin user. Must be at least 8 characters
      and contain both letters and numbers.
    Type: String
    MinLength: 8
    AllowedPattern: ^(?=.*[a-zA-Z])(?=.*[0-9]).{8,}$
    ConstraintDescription: Must be at least 8 characters and contain both letters and numbers.
    NoEcho: true
  NumberOfServers:
    Description: Number of EC2 instances to deploy
    Type: Number
    Default: 3
    AllowedValues:
    - 1
    - 3
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: r8i.xlarge
    AllowedValues:
    - t3.medium
    - r8i.large
    - r8i.xlarge
    - r8i.2xlarge
    - r8i.4xlarge
    - r8i.8xlarge
    - r8i.12xlarge
    - r8i.16xlarge
    - r8i.24xlarge
    - r8i.32xlarge
    - r8i.48xlarge
    - r8i.96xlarge
  DataDiskSize:
    Description: >-
      Size in GB of the persistent Neo4j data volume attached to each cluster
      node. This volume is retained across instance replacement: a new
      instance reattaches the existing volume and Raft catches up rather than
      performing a full store copy. The root volume (OS + Neo4j binaries) is
      fixed at 20 GB and not user-tunable.
    Type: Number
    Default: 100
    MinValue: 100
    MaxValue: 65536
  DataVolumeKmsKeyId:
    Description: >-
      Optional. KMS key ID or ARN for data volume encryption. Leave blank to
      use the account's default EBS encryption key (aws/ebs unless overridden
      at the account level).
    Type: String
    Default: ''
  AlertEmail:
    Description: Email address for CloudWatch alarm notifications. Leave blank to skip email subscription.
    Type: String
    Default: ''
  InstallGDS:
    Description: >-
      Install the Graph Data Science plugin at deploy time. Intended for testing
      with deploy.py only; leave false for Marketplace deployments.
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
