  VpcId:
    Type: String
    Description: ID of the existing VPC to deploy Neo4j into.
  PrivateSubnet1Id:
    Type: String
    Description: >-
      First private subnet ID (must be in a different AZ from Subnet 2 and 3).
  PrivateRouteTable1Id:
    Type: String
    Description: Route table ID associated with PrivateSubnet1Id.
  PrivateSubnet2Id:
    Type: String
    Default: ''
    Description: Second private subnet ID; required when NumberOfServers is 3.
  PrivateSubnet3Id:
    Type: String
    Default: ''
    Description: Third private subnet ID; required when NumberOfServers is 3.
  CreateVpcEndpoints:
    Type: String
    AllowedValues:
      - 'true'
      - 'false'
    Default: 'true'
    Description: >-
      Create VPC interface endpoints for SSM, SSM Messages, CloudWatch Logs,
      and Secrets Manager. Set to false if your VPC already has these endpoints
      — creating duplicates fails the deployment. When false,
      ExistingEndpointSgId must be provided.
  ExistingEndpointSgId:
    Type: String
    Default: ''
    Description: >-
      Security group ID already attached to your VPC's interface endpoints.
      Required when CreateVpcEndpoints is false. The stack adds ingress rules
      (port 443) from the Neo4j instances and operator bastion into this SG,
      and publishes it as vpc-endpoint-sg-id in the SSM contract.
  AllowedCIDR:
    Description: >-
      Enter the CIDR of your existing VPC, e.g. 10.0.0.0/16 or
      172.16.0.0/12. 0.0.0.0/0 is not accepted.
    Type: String
    AllowedPattern: ^(?!0\.0\.0\.0\/0)(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$
    ConstraintDescription: Must be a valid CIDR range. 0.0.0.0/0 is not accepted.
  CreatePrivateDns:
    Type: String
    AllowedValues:
      - 'true'
      - 'false'
    Default: 'false'
    Description: >-
      Create or manage a Route 53 private DNS record that maps AdvertisedDNS to
      the internal NLB. Use for repeatable private test stacks or when you want
      this stack to own the in-VPC service DNS record.
  PrivateDnsZoneName:
    Type: String
    Default: ''
    Description: >-
      Private hosted zone name to create when CreatePrivateDns is true and
      PrivateDnsHostedZoneId is blank, for example test.local or
      internal.example.com. AdvertisedDNS must be inside this zone.
  PrivateDnsHostedZoneId:
    Type: String
    Default: ''
    AllowedPattern: ^$|^Z[A-Z0-9]+$
    ConstraintDescription: Must be blank or a Route 53 hosted zone ID beginning with Z.
    Description: >-
      Existing Route 53 private hosted zone ID to receive the AdvertisedDNS
      alias record. Leave blank to let this stack create a private hosted zone
      named PrivateDnsZoneName.
