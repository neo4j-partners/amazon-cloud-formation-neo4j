  AllowedCIDR:
    Description: >-
      CIDR allowed to reach Neo4j ports 7473 (HTTPS) and 7687 (Bolt); defaults
      to the VPC CIDR this template creates.
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: ^(?!0\.0\.0\.0\/0)(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$
    ConstraintDescription: Must be a valid CIDR range. 0.0.0.0/0 is not accepted.
  CreatePrivateDns:
    Type: String
    AllowedValues:
      - 'true'
      - 'false'
    Default: 'false'
    Description: >-
      Create or manage a Route 53 private DNS record that maps AdvertisedDNS to
      the internal NLB. Use for repeatable private test stacks or when you want
      this stack to own the in-VPC service DNS record.
  PrivateDnsZoneName:
    Type: String
    Default: ''
    Description: >-
      Private hosted zone name to create when CreatePrivateDns is true and
      PrivateDnsHostedZoneId is blank, for example test.local or
      internal.example.com. AdvertisedDNS must be inside this zone.
  PrivateDnsHostedZoneId:
    Type: String
    Default: ''
    AllowedPattern: ^$|^Z[A-Z0-9]+$
    ConstraintDescription: Must be blank or a Route 53 hosted zone ID beginning with Z.
    Description: >-
      Existing Route 53 private hosted zone ID to receive the AdvertisedDNS
      alias record. Leave blank to let this stack create a private hosted zone
      named PrivateDnsZoneName.
