  AllowedCIDR:
    Description: >-
      Enter the CIDR allowed to reach Neo4j ports 7474 and 7687 (e.g. your
      office IP as x.x.x.x/32). 0.0.0.0/0 is not accepted.
    Type: String
    AllowedPattern: ^(?!0\.0\.0\.0\/0)(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$
    ConstraintDescription: Must be a valid CIDR range. 0.0.0.0/0 is not accepted.
  EnableTLS:
    Description: >-
      Set to true to enable TLS on public Browser (7473) and Bolt (7687).
      Requires CertificateArn and AdvertisedDNS. When false, Browser uses HTTP
      on 7474 and Bolt uses plaintext on 7687.
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
