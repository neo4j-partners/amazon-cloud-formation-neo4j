  ExistingEndpointSgIdRequired:
    RuleCondition: !Equals [!Ref CreateVpcEndpoints, 'false']
    Assertions:
      - Assert: !Not [!Equals [!Ref ExistingEndpointSgId, '']]
        AssertDescription: >-
          ExistingEndpointSgId must be provided when CreateVpcEndpoints is false.
  CertificateArnRequired:
    Assertions:
      - Assert: !Not [!Equals [!Ref CertificateArn, '']]
        AssertDescription: CertificateArn is required for ExistingVpc deployments.
  AdvertisedDNSRequired:
    Assertions:
      - Assert: !Not [!Equals [!Ref AdvertisedDNS, '']]
        AssertDescription: AdvertisedDNS is required for ExistingVpc deployments.
  PrivateDnsZoneRequired:
    RuleCondition: !And
      - !Equals [!Ref CreatePrivateDns, 'true']
      - !Equals [!Ref PrivateDnsHostedZoneId, '']
    Assertions:
      - Assert: !Not [!Equals [!Ref PrivateDnsZoneName, '']]
        AssertDescription: >-
          PrivateDnsZoneName must be provided when CreatePrivateDns is true and
          PrivateDnsHostedZoneId is blank.
