  Neo4jPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'neo4j/${AWS::StackName}/password'
      Description: !Sub 'Neo4j admin password for stack ${AWS::StackName}'
      SecretString: !Ref Password
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
        - Key: "aws-apn-id"
          Value: "pc:4t4a9h39qkq4tbo3n9zd51p25"

  Neo4jConfigVpcIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/vpc-id'
      Type: String
      Value: !Ref VpcId
      Description: VPC ID for the Neo4j EE stack.

  Neo4jConfigNlbDnsParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/nlb-dns'
      Type: String
      Value: !GetAtt Neo4jNetworkLoadBalancer.DNSName
      Description: Internal NLB DNS name. Map AdvertisedDNS to this hostname so TLS clients connect via the cert SAN.

  Neo4jConfigAdvertisedDnsParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/advertised-dns'
      Type: String
      Value: !Ref AdvertisedDNS
      Description: Advertised DNS name that resolves to the NLB and matches the ACM cert SAN. Operator tooling connects via neo4j+ssc://<advertised-dns>:7687; production clients with a trusted cert use neo4j+s://<advertised-dns>:7687. Browser is https://<advertised-dns>:7473.

  Neo4jConfigPrivateDnsHostedZoneIdParameter:
    Type: AWS::SSM::Parameter
    Condition: CreatePrivateDns
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/private-dns-hosted-zone-id'
      Type: String
      Value: !If
        - UseExistingPrivateDnsHostedZone
        - !Ref PrivateDnsHostedZoneId
        - !Ref Neo4jPrivateDnsHostedZone
      Description: Route 53 private hosted zone ID containing the AdvertisedDNS record.

  Neo4jConfigPrivateDnsRecordParameter:
    Type: AWS::SSM::Parameter
    Condition: CreatePrivateDns
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/private-dns-record'
      Type: String
      Value: !Ref AdvertisedDNS
      Description: Route 53 private DNS record mapped to the internal NLB.

  Neo4jConfigRegionParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/region'
      Type: String
      Value: !Ref 'AWS::Region'
      Description: AWS region for the Neo4j EE stack.

  Neo4jConfigStackNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/stack-name'
      Type: String
      Value: !Ref 'AWS::StackName'
      Description: CloudFormation stack name.

  Neo4jConfigPrivateSubnet1Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/private-subnet-1-id'
      Type: String
      Value: !Ref PrivateSubnet1Id
      Description: First private subnet ID (Lambda / reference app placement).

  Neo4jConfigPrivateRouteTable1Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/private-route-table-1-id'
      Type: String
      Value: !Ref PrivateRouteTable1Id
      Description: First private route table ID (Lambda / reference app placement).

  Neo4jConfigPrivateSubnet2Parameter:
    Type: AWS::SSM::Parameter
    Condition: CreateCluster
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/private-subnet-2-id'
      Type: String
      Value: !Ref PrivateSubnet2Id
      Description: Second private subnet ID (Lambda / reference app placement).

  Neo4jConfigPasswordSecretArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/password-secret-arn'
      Type: String
      Value: !Ref Neo4jPasswordSecret
      Description: Secrets Manager ARN for the Neo4j admin password (used by in-VPC Lambda clients).

  Neo4jConfigExternalSgIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/external-sg-id'
      Type: String
      Value: !GetAtt Neo4jNLBSecurityGroup.GroupId
      Description: Neo4j NLB security group ID. In-VPC apps add this as the 7473/7687 egress target and add ingress from their SG.

  Neo4jConfigVpcEndpointSgParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/vpc-endpoint-sg-id'
      Type: String
      Value: !If [CreateVpcEndpoints, !GetAtt VpcEndpointSecurityGroup.GroupId, !Ref ExistingEndpointSgId]
      Description: Security group ID on all interface VPC endpoints. In-VPC apps add this as an ingress rule source so their SG can reach SSM, Secrets Manager, and CloudWatch Logs via PrivateLink.
