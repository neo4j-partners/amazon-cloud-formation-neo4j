  # Public mode publishes only the NLB DNS to SSM. The other modes (Private,
  # ExistingVpc) publish a fuller set of in-VPC discovery parameters via their
  # own stack-config*.yaml partials; Public has no in-VPC client use case, so
  # the NLB DNS is the only entry consumed by deploy.py --tls when it generates
  # the self-signed Bolt certificate.
  Neo4jConfigNlbDnsParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/neo4j-ee/${AWS::StackName}/nlb-dns'
      Type: String
      Value: !GetAtt Neo4jNetworkLoadBalancer.DNSName
      Description: Public NLB DNS name (used by deploy.py --tls for cert SAN).
