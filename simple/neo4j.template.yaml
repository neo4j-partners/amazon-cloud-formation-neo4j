AWSTemplateFormatVersion: '2010-09-09'
Description: Neo4j Enterprise Edition
Metadata:
  AWS::CloudFormation::Interface: 
    ParameterGroups: 
      - Label: 
          default: "Neo4j Configuration"
        Parameters: 
          - GraphDatabaseVersion
          - GraphDataScienceVersion
          - BloomVersion
          - ApocVersion
          - InstallBloom
          - InstallGraphDataScience
          - AdminPassword
          - GraphDataScienceLicenseKey
          - BloomLicenseKey
      - Label: 
          default: "Infrastructure Configuration"
        Parameters: 
          - NodeCount
          - InstanceType
          - DiskSize
          - KeyName
          - ImageId
    ParameterLabels:
      GraphDatabaseVersion: 
        default: Graph Database Version
      GraphDataScienceVersion: 
        default: Graph Data Science Version
      BloomVersion:
        default: Bloom Version
      ApocVersion:
        default: Apoc Version
      InstallGraphDataScience:
        default: Install Graph Data Science
      InstallBloom:
        default: Install Bloom
      AdminPassword:
        default: Admin Password
      GraphDataScienceLicenseKey:
        default: Graph Data Science License Key
      BloomLicenseKey:
        default: Bloom License Key
      NodeCount: 
        default: Node Count
      InstanceType: 
        default: Instance Type
      DiskSize: 
        default: Disk Size
      KeyName: 
        default: Key Name
      ImageId: 
        default: AMI ID

Parameters:
  GraphDatabaseVersion:
    Description: Neo4j Graph Database Version
    Type: String
    Default: '4.4.5'
    AllowedValues:
      - '4.4.5'
      - '4.4.4'
      - '4.3.10'
      - '4.2.14'

  InstallGraphDataScience:
    Description: Install Graph Data Science
    Type: String
    Default: true
    AllowedValues:
      - true
      - false

  InstallBloom:
    Description: Install Bloom
    Type: String
    Default: true
    AllowedValues:
      - true
      - false

  GraphDataScienceVersion:
    Description: Neo4j Graph Data Science Version
    Type: String
    Default: '1.8.3'
    AllowedValues:
      - 'None'
      - '1.8.3'

  BloomVersion:
    Description: Neo4j Bloom Version
    Type: String
    Default: '2.1.1'
    AllowedValues:
      - 'None'
      - '2.1.1'
      - '2.1.0'
      - '2.0.0'

  ApocVersion:
    Description: Apoc Version
    Type: String
    Default: '4.4.0.3'
    AllowedValues:
      - 'None'
      - '4.4.0.3'

  AdminPassword:
    Description: Password for Neo4j
    Type: String
    MinLength: 6
    NoEcho: true

  GraphDataScienceLicenseKey:
    Description: Graph Data Science License Key
    Type: String
    Default: 'None'

  BloomLicenseKey:
    Description: Bloom License Key
    Type: String
    Default: 'None'

  NodeCount:
    Description: Number of core nodes
    Type: Number
    Default: 1
    AllowedValues:
      - 1
      - 3

  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.xlarge
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge
      - r6i.large
      - r6i.xlarge
      - r6i.2xlarge
      - r6i.4xlarge
      - r6i.8xlarge
      - r6i.12xlarge
      - r6i.16xlarge
      - r6i.24xlarge
      - r6i.32xlarge

  DiskSize:
    Description: Size in GB of the EBS volume on each node
    Type: Number
    Default: 100

  KeyName:
    Description: Name of an existing EC2 KeyPair
    Type: AWS::EC2::KeyPair::KeyName

  ImageId:
    Description: AMI ID for each node
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2

Resources:
  Neo4jAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AvailabilityZones:
        Fn::GetAZs: ''
      LaunchConfigurationName:
        Ref: Neo4jLaunchConfiguration
      MinSize: 1
      MaxSize: 3
      DesiredCapacity:
        Ref: NodeCount
      Tags:
        - Key: StackID
          Value: !Ref 'AWS::StackId'
          PropagateAtLaunch: true
        - Key: Name
          Value: !Ref 'AWS::StackName'
          PropagateAtLaunch: true

  Neo4jLaunchConfiguration:
    Type: AWS::AutoScaling::LaunchConfiguration
    Properties:
      ImageId: !Ref ImageId
      InstanceType:
        Ref: InstanceType
      SecurityGroups:
      - Ref: Neo4jExternalSecurityGroup
      - Ref: Neo4jInternalSecurityGroup
      KeyName:
        Ref: KeyName
      EbsOptimized: true
      IamInstanceProfile:
        Ref: Neo4jInstanceProfile
      BlockDeviceMappings:
      - DeviceName: /dev/xvda
        Ebs:
          VolumeSize:
            Ref: DiskSize
          VolumeType: gp3
          Encrypted: true
      UserData:
        Fn::Base64:
          !Join
          - ''
          - - "#!/bin/bash\n"
            - "echo Running startup script...\n"
            - "adminPassword="
            - Ref: AdminPassword
            - "\n"

            - "graphDatabaseVersion="
            - Ref: GraphDatabaseVersion
            - "\n"

            - "installBloom="
            - Ref: InstallBloom
            - "\n"

            - "installGraphDataScience="
            - Ref: InstallGraphDataScience
            - "\n"

            - "graphDataScienceVersion="
            - Ref: GraphDataScienceVersion
            - "\n"

            - "bloomVersion="
            - Ref: BloomVersion
            - "\n"

            - "apocVersion="
            - Ref: ApocVersion
            - "\n"

            - "graphDataScienceLicenseKey="
            - Ref: GraphDataScienceLicenseKey
            - "\n"

            - "bloomLicenseKey="
            - Ref: BloomLicenseKey
            - "\n"

            - "nodeCount="
            - Ref: NodeCount
            - "\n"

            - "echo \"Using the settings... \"\n"
            - "echo \"NodeCount: ${nodeCount}\"\n"
            - "echo \"adminPassword: ${adminPassword}\"\n"
            - "echo \"graphDatabaseVersion: ${graphDatabaseVersion}\"\n"
            - "echo \"installGraphDataScience: ${installGraphDataScience}\"\n"
            - "echo \"graphDataScienceLicenseKey: ${graphDataScienceLicenseKey}\"\n"
            - "echo \"installBloom: ${installBloom}\"\n"
            - "echo \"bloomLicenseKey: ${bloomLicenseKey}\"\n"
            - "echo \"apocVersion: ${apocVersion}\"\n"
            - "echo \"bloomVersion: ${bloomVersion}\"\n"
            - "echo \"graphDataScienceVersion: ${graphDataScienceVersion}\"\n"

            - "echo Turning off firewalld\n"
            - "systemctl stop firewalld\n"
            - "systemctl disable firewalld\n"

            - "echo Adding neo4j yum repo...\n"
            - "rpm --import https://debian.neo4j.com/neotechnology.gpg.key\n"
            - "echo \"\n"
            - "[neo4j]\n"
            - "name=Neo4j Yum Repo\n"

            - "baseurl=http://yum.neo4j.com/stable\n"
            - "enabled=1\n"
            - "gpgcheck=1\" > /etc/yum.repos.d/neo4j.repo\n"

            - "echo Installing Graph Database...\n"
            - "export NEO4J_ACCEPT_LICENSE_AGREEMENT=yes\n"
            - "yum -y install neo4j-enterprise-${graphDatabaseVersion}\n"

            - "echo Installing unzip...\n"
            - "yum -y install unzip\n"

            - "echo Configuring network in neo4j.conf...\n"
            - "sed -i 's/#dbms.default_listen_address=0.0.0.0/dbms.default_listen_address=0.0.0.0/g' /etc/neo4j/neo4j.conf\n"
            
            - "publicHostname=$(curl -s http://169.254.169.254/latest/meta-data/public-hostname)\n"
            - "echo \"publicHostname: ${publicHostname}\"\n"
            - "sed -i s/#dbms.default_advertised_address=localhost/dbms.default_advertised_address=${publicHostname}/g /etc/neo4j/neo4j.conf\n"


            - "echo Installing on ${nodeCount} node\n"
            - "if [[ $nodeCount == 1 ]]; then\n"
            - "  echo Running on a single node.\n"
            - "else\n"
            - "  echo Running on $nodeCount nodes.\n"
            - "  coreMembers=$(python3 parseCoreMembers.py $deployment)\n"
            - "  sed -i s/#causal_clustering.initial_discovery_members=localhost:5000,localhost:5001,localhost:5002/causal_clustering.initial_discovery_members=${coreMembers}/g /etc/neo4j/neo4j.conf\n"
            - "  sed -i s/#dbms.mode=CORE/dbms.mode=CORE/g /etc/neo4j/neo4j.conf\n"
            - "fi\n"

            - "if [[ $installGraphDataScience == True && $nodeCount == 1 ]]; then\n"
            - " if [[ $graphDataScienceVersion == None ]]; then\n"
            - "     echo Installing bundled Graph Data Science...\n"
            - "     cp /var/lib/neo4j/products/neo4j-graph-data-science-*.jar /var/lib/neo4j/plugins\n"
            - "  else\n"
            - "      echo Installing Graph Data Science $graphDataScienceVersion\n"
            - "      curl \"https://graphdatascience.ninja/neo4j-graph-data-science-${graphDataScienceVersion}.zip\" -o \"neo4j-graph-data-science-${graphDataScienceVersion}.zip\"\n"
            - "      unzip \"neo4j-graph-data-science-${graphDataScienceVersion}.zip\"\n"
            - "      cp \"neo4j-graph-data-science-${graphDataScienceVersion}.jar\" /var/lib/neo4j/plugins\n"
            - "  fi\n"
            - "else\n"
            - "    echo Not installing Graph Data Science\n"
            - "fi\n"


            - "if [[ $installBloom == True ]]; then\n"
            - "  if [[ $bloomVersion == None ]]; then\n"
            - "    echo Installing bundled Bloom\n"
            - "    cp /var/lib/neo4j/products/bloom-plugin-*.jar /var/lib/neo4j/plugins\n"
            - "  else\n"
            - "   echo Installing Bloom $bloomVersion\n"
            - "    curl -L \"https://neo4j.com/artifact.php?name=neo4j-bloom-${bloomVersion}.zip\" -o \"neo4j-bloom-${bloomVersion}.zip\"\n"
            - "    unzip neo4j-bloom-${bloomVersion}.zip\n"
            - "    cp \"bloom-plugin-4.x-${bloomVersion}.jar\" /var/lib/neo4j/plugins\n"
            - " fi\n"
            - "else\n"
            - "    echo Not installing Bloom\n"
            - "fi\n"

            - "if [[ $bloomLicenseKey != None ]]; then\n"
            - "  echo Writing Bloom license key...\n"
            - "  mkdir -p /etc/neo4j/licenses\n"
            - "  echo $bloomLicenseKey > /etc/neo4j/licenses/neo4j-bloom.license\n"
            - "  sed -i '$a neo4j.bloom.license_file=/etc/neo4j/licenses/neo4j-bloom.license' /etc/neo4j/neo4j.conf\n"
            - "fi\n"

            - "if [[ $graphDataScienceLicenseKey != None ]]; then\n"
            - "  echo Writing GDS license key...\n"
            - "  mkdir -p /etc/neo4j/licenses\n"
            - "  echo $graphDataScienceLicenseKey > /etc/neo4j/licenses/neo4j-gds.license\n"
            - "  sed -i '$a gds.enterprise.license_file=/etc/neo4j/licenses/neo4j-gds.license' /etc/neo4j/neo4j.conf\n"
            - "fi\n"

            - "if [[ $apocVersion == None ]]; then\n"
            - "  echo Installing bundled Apoc\n"
            - "  cp /var/lib/neo4j/labs/apoc-*.jar /var/lib/neo4j/plugins\n"
            - "else\n"
            - "  echo Installing Apoc $apocVersion\n"
            - "  curl -L \"https://github.com/neo4j-contrib/neo4j-apoc-procedures/releases/download/${apocVersion}/apoc-${apocVersion}-all.jar\" -o \"apoc-${apocVersion}-all.jar\"\n"
            - "  cp \"apoc-${apocVersion}-all.jar\" /var/lib/neo4j/plugins\n"
            - "fi\n"
              
            - "echo Configuring extensions and security in neo4j.conf...\n"
            - "sed -i s~#dbms.unmanaged_extension_classes=org.neo4j.examples.server.unmanaged=/examples/unmanaged~dbms.unmanaged_extension_classes=com.neo4j.bloom.server=/bloom,semantics.extension=/rdf~g /etc/neo4j/neo4j.conf\n"
            - "sed -i s/#dbms.security.procedures.unrestricted=my.extensions.example,my.procedures.*/dbms.security.procedures.unrestricted=,jwt.security.*,apoc.*,gds.*,bloom.*/g /etc/neo4j/neo4j.conf\n"
            - "sed -i '$a dbms.security.http_auth_allowlist=/,/browser.*,/bloom.*' /etc/neo4j/neo4j.conf\n"
            - "sed -i '$a dbms.security.procedures.allowlist=apoc.*,gds.*,bloom.*' /etc/neo4j/neo4j.conf\n"

            - "echo Setting service permission bits to 644...\n"
            - "sudo chmod 644 /usr/lib/systemd/system/neo4j.service\n"

            - "echo Starting Neo4j...\n"
            - "service neo4j start\n"
            - "echo Setting initial password...\n"
            - "neo4j-admin set-initial-password ${adminPassword}\n"

  Neo4jInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
      - Ref: Neo4jRole
  Neo4jRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service:
            - ec2.amazonaws.com
          Action:
          - sts:AssumeRole
      Policies:
      - PolicyName: Neo4jPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - autoscaling:DescribeAutoScalingInstances
            - cloudformation:DescribeStack*
            - ec2:DescribeInstances
            Resource: "*"

  Neo4jExternalSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH and Neo4j External Ports
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 22
        ToPort: 22
        CidrIp: 0.0.0.0/0
      - IpProtocol: tcp
        FromPort: 7473
        ToPort: 7473
        CidrIp: 0.0.0.0/0
      - IpProtocol: tcp
        FromPort: 7474
        ToPort: 7474
        CidrIp: 0.0.0.0/0
      - IpProtocol: tcp
        FromPort: 7687
        ToPort: 7687
        CidrIp: 0.0.0.0/0

  Neo4jInternalSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable Neo4j Internal Ports
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 5000
        ToPort: 5000
        SourceSecurityGroupName: !Ref Neo4jExternalSecurityGroup
      - IpProtocol: tcp
        FromPort: 6000
        ToPort: 6000
        SourceSecurityGroupName: !Ref Neo4jExternalSecurityGroup
      - IpProtocol: tcp
        FromPort: 7000
        ToPort: 7000
        SourceSecurityGroupName: !Ref Neo4jExternalSecurityGroup
      - IpProtocol: tcp
        FromPort: 7688
        ToPort: 7688
        SourceSecurityGroupName: !Ref Neo4jExternalSecurityGroup
      - IpProtocol: tcp
        FromPort: 2003
        ToPort: 2003
        SourceSecurityGroupName: !Ref Neo4jExternalSecurityGroup
      - IpProtocol: tcp
        FromPort: 2004
        ToPort: 2004
        SourceSecurityGroupName: !Ref Neo4jExternalSecurityGroup
      - IpProtocol: tcp
        FromPort: 3637
        ToPort: 3637
        SourceSecurityGroupName: !Ref Neo4jExternalSecurityGroup
      - IpProtocol: tcp
        FromPort: 5005
        ToPort: 5005
        SourceSecurityGroupName: !Ref Neo4jExternalSecurityGroup

Outputs:
  Neo4jURL:
    Description: URL for Neo4j
    Value: 'You can login to Neo4j on port 7474 (http) or 7473 (https) of any node in the autoscaling group.'
  Neo4jUsername:
    Description: Username for Neo4j
    Value: 'The username is neo4j.  The password is what you provided to the template.'
